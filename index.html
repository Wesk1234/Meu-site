<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleta de Dados - Projeto Fictício</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <header>
            <h2>Formulário de Cadastro Acadêmico</h2>
            <p>Os dados coletados aqui são para fins de simulação e testes de sistema.</p>
        </header>

        <form action="https://formspree.io/f/seu-codigo" method="POST">
            
            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" required placeholder="Ex: João Silva">
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required placeholder="contato@exemplo.com">
                </div>
                
                <div class="input-group">
                    <label for="idade">Idade</label>
                    <input type="number" id="idade" name="idade" min="1" max="120">
                </div>
            </div>

            <div class="input-group">
                <label for="categoria">Área de Interesse</label>
                <select id="categoria" name="categoria">
                    <option value="tecnologia">Tecnologia</option>
                    <option value="esportes">Esportes</option>
                    <option value="saude">Saúde</option>
                    <option value="educacao">Educação</option>
                </select>
            </div>

            <div class="input-group">
                <label>Frequência de Uso</label>
                <div class="radio-group">
                    <label><input type="radio" name="frequencia" value="diario"> Diário</label>
                    <label><input type="radio" name="frequencia" value="semanal"> Semanal</label>
                    <label><input type="radio" name="frequencia" value="raramente"> Raramente</label>
                </div>
            </div>

            <button type="submit" class="btn-enviar">Registrar Dados</button>
        </form>
    </div>

</body>
</html>
